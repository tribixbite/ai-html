<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Markdown Viewer</title>
    <!-- Markdown parsing + sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <!-- Syntax highlighting (Prism — loads grammars on demand) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css" id="prism-dark">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism.min.css" id="prism-light" disabled>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
    <!-- Mermaid diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        /* ── Theme Variables ── */
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
            --radius: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --toc-width: 260px;
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --bg: #0b0f19;
            --surface: #141a2a;
            --surface-raised: #1c2438;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --border: #1e293b;
            --border-strong: #334155;
            --code-bg: #0f172a;
            --table-stripe: rgba(96, 165, 250, 0.04);
            --table-hover: rgba(96, 165, 250, 0.08);
            --scrollbar-track: #1e293b;
            --scrollbar-thumb: #475569;
            --error-bg: #1c0f0f;
            --error-border: #7f1d1d;
            --error-text: #fecaca;
            --warning-bg: #1c1509;
            --warning-border: #92400e;
            --warning-text: #fde68a;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --glow: 0 0 20px rgba(96, 165, 250, 0.1);
            /* GFM alert colors */
            --note-bg: rgba(96, 165, 250, 0.08);
            --note-border: #3b82f6;
            --note-text: #93c5fd;
            --tip-bg: rgba(34, 197, 94, 0.08);
            --tip-border: #22c55e;
            --tip-text: #86efac;
            --important-bg: rgba(168, 85, 247, 0.08);
            --important-border: #a855f7;
            --important-text: #c4b5fd;
            --warning-alert-bg: rgba(234, 179, 8, 0.08);
            --warning-alert-border: #eab308;
            --warning-alert-text: #fde68a;
            --caution-bg: rgba(239, 68, 68, 0.08);
            --caution-border: #ef4444;
            --caution-text: #fca5a5;
        }

        [data-theme="light"] {
            color-scheme: light;
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-raised: #f1f5f9;
            --text: #1e293b;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --code-bg: #f1f5f9;
            --table-stripe: rgba(37, 99, 235, 0.03);
            --table-hover: rgba(37, 99, 235, 0.06);
            --scrollbar-track: #e2e8f0;
            --scrollbar-thumb: #94a3b8;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #991b1b;
            --warning-bg: #fffbeb;
            --warning-border: #fde68a;
            --warning-text: #92400e;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --glow: none;
            --note-bg: rgba(37, 99, 235, 0.06);
            --note-border: #2563eb;
            --note-text: #1d4ed8;
            --tip-bg: rgba(22, 163, 74, 0.06);
            --tip-border: #16a34a;
            --tip-text: #15803d;
            --important-bg: rgba(147, 51, 234, 0.06);
            --important-border: #9333ea;
            --important-text: #7e22ce;
            --warning-alert-bg: rgba(202, 138, 4, 0.06);
            --warning-alert-border: #ca8a04;
            --warning-alert-text: #a16207;
            --caution-bg: rgba(220, 38, 38, 0.06);
            --caution-border: #dc2626;
            --caution-text: #b91c1c;
        }

        /* ── Reset ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* ── Base ── */
        html {
            background: var(--bg);
            color: var(--text);
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            line-height: 1.7;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding: 0;
        }

        /* ── Top Bar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .topbar-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .topbar-title span {
            color: var(--accent);
        }

        .topbar-actions {
            display: flex;
            gap: 0.375rem;
            flex-shrink: 0;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface-raised);
            color: var(--text-muted);
            font-size: 0.8125rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .btn:hover { background: var(--border); color: var(--text); border-color: var(--border-strong); }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }

        .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

        .btn-icon {
            padding: 0.375rem;
            min-width: 34px;
            min-height: 34px;
            justify-content: center;
        }

        .btn-active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ── URL Input Bar ── */
        .url-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
            max-height: 80px;
            overflow: hidden;
        }

        .url-bar.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-bottom: none;
            opacity: 0;
            pointer-events: none;
        }

        .url-bar input {
            flex: 1;
            min-width: 0;
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.875rem;
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--transition);
        }

        .url-bar input:focus { border-color: var(--accent); }
        .url-bar input::placeholder { color: var(--text-dim); }

        /* ── Layout wrapper ── */
        .layout {
            display: flex;
            min-height: calc(100dvh - 50px);
        }

        /* ── TOC Sidebar ── */
        .toc-sidebar {
            position: sticky;
            top: 50px;
            width: var(--toc-width);
            max-height: calc(100dvh - 50px);
            overflow-y: auto;
            flex-shrink: 0;
            padding: 1rem 0 1rem 1rem;
            border-right: 1px solid var(--border);
            background: var(--surface);
            display: none;
        }

        .toc-sidebar.visible { display: block; }

        .toc-title {
            font-size: 0.6875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            padding: 0 0.5rem 0.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.5rem;
        }

        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .toc-list a {
            display: block;
            padding: 0.25rem 0.5rem;
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 4px;
            border-left: 2px solid transparent;
            transition: all var(--transition);
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toc-list a:hover { color: var(--text); background: var(--surface-raised); }
        .toc-list a.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface-raised); }
        .toc-list .toc-h3 { padding-left: 1.25rem; font-size: 0.75rem; }
        .toc-list .toc-h4 { padding-left: 2rem; font-size: 0.6875rem; }

        /* ── TOC mobile drawer ── */
        .toc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .toc-overlay.open { display: block; }

        .toc-drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: min(300px, 85vw);
            z-index: 201;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1rem;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        .toc-overlay.open .toc-drawer { transform: translateX(0); }

        .toc-drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        /* ── Container ── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
            flex: 1;
            min-width: 0;
        }

        /* ── Status Messages ── */
        .error {
            color: var(--error-text);
            padding: 1rem;
            border: 1px solid var(--error-border);
            border-radius: var(--radius);
            background: var(--error-bg);
            margin: 1rem 0;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .warning {
            color: var(--warning-text);
            padding: 1rem;
            border: 1px solid var(--warning-border);
            border-radius: var(--radius);
            background: var(--warning-bg);
            margin: 1rem 0;
            font-size: 0.875rem;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ── Markdown Content ── */
        .md h1, .md h2, .md h3, .md h4 {
            position: relative;
            cursor: pointer;
        }

        /* Anchor link indicator on hover */
        .md h1:hover .heading-anchor,
        .md h2:hover .heading-anchor,
        .md h3:hover .heading-anchor,
        .md h4:hover .heading-anchor {
            opacity: 1;
        }

        .heading-anchor {
            opacity: 0;
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 0.375rem;
            font-weight: 400;
            transition: opacity var(--transition);
            font-size: 0.8em;
        }

        .md h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 1rem;
            padding-bottom: 0.625rem;
            border-bottom: 2px solid var(--border);
            line-height: 1.3;
        }

        .md h2 {
            font-size: 1.375rem;
            font-weight: 650;
            margin: 2rem 0 0.75rem;
            padding-bottom: 0.375rem;
            border-bottom: 1px solid var(--border);
            line-height: 1.35;
        }

        .md h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 1.5rem 0 0.5rem;
            color: var(--text);
        }

        .md h4 {
            font-size: 1rem;
            font-weight: 600;
            margin: 1.25rem 0 0.5rem;
            color: var(--text-muted);
        }

        .md p { margin-bottom: 0.875rem; }

        .md a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color var(--transition);
        }
        .md a:hover { border-bottom-color: var(--accent); }

        .md strong { font-weight: 650; color: var(--text); }

        .md hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 2rem 0;
        }

        /* ── Inline Code ── */
        .md code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: var(--code-bg);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            color: var(--accent);
            word-break: break-word;
        }

        /* ── Code Blocks with copy button ── */
        .code-block-wrap {
            position: relative;
            margin: 1rem 0;
        }

        .code-block-wrap .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.6875rem;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            cursor: pointer;
            opacity: 0;
            transition: opacity var(--transition), color var(--transition);
            z-index: 2;
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .code-block-wrap:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { color: var(--text); border-color: var(--border-strong); }
        .copy-btn.copied { color: var(--accent); }

        .copy-btn svg { width: 12px; height: 12px; }

        /* Language label */
        .code-lang {
            position: absolute;
            top: 0.5rem;
            left: 0.75rem;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            z-index: 2;
            pointer-events: none;
        }

        .md pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 1rem 1rem;
            overflow-x: auto;
            margin: 0;
            -webkit-overflow-scrolling: touch;
        }

        .md pre code {
            background: none;
            padding: 0;
            color: var(--text);
            font-size: 0.8125rem;
            line-height: 1.6;
            word-break: normal;
        }

        /* Override Prism background to use our theme vars */
        .md pre[class*="language-"],
        .md code[class*="language-"] {
            background: var(--code-bg);
        }

        /* ── Blockquotes ── */
        .md blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            color: var(--text-muted);
            background: var(--surface-raised);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        .md blockquote p:last-child { margin-bottom: 0; }

        /* ── GFM Alerts ── */
        .gfm-alert {
            padding: 0.75rem 1rem;
            margin: 1rem 0;
            border-radius: var(--radius);
            border-left: 4px solid;
        }

        .gfm-alert-title {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-weight: 600;
            font-size: 0.8125rem;
            margin-bottom: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .gfm-alert-title svg { width: 16px; height: 16px; flex-shrink: 0; }

        .gfm-alert p { margin-bottom: 0.375rem; font-size: 0.875rem; }
        .gfm-alert p:last-child { margin-bottom: 0; }

        .gfm-alert-note { background: var(--note-bg); border-color: var(--note-border); }
        .gfm-alert-note .gfm-alert-title { color: var(--note-text); }

        .gfm-alert-tip { background: var(--tip-bg); border-color: var(--tip-border); }
        .gfm-alert-tip .gfm-alert-title { color: var(--tip-text); }

        .gfm-alert-important { background: var(--important-bg); border-color: var(--important-border); }
        .gfm-alert-important .gfm-alert-title { color: var(--important-text); }

        .gfm-alert-warning { background: var(--warning-alert-bg); border-color: var(--warning-alert-border); }
        .gfm-alert-warning .gfm-alert-title { color: var(--warning-alert-text); }

        .gfm-alert-caution { background: var(--caution-bg); border-color: var(--caution-border); }
        .gfm-alert-caution .gfm-alert-title { color: var(--caution-text); }

        /* ── Lists ── */
        .md ul, .md ol {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }

        .md li { margin-bottom: 0.25rem; }
        .md li::marker { color: var(--text-dim); }

        /* ── Task Lists ── */
        .md ul li input[type="checkbox"] {
            margin-right: 0.5rem;
            accent-color: var(--accent);
        }

        /* ── Images ── */
        .md img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin: 1rem 0;
        }

        /* ── Mermaid ── */
        .mermaid-wrap {
            margin: 1rem 0;
            padding: 1rem;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            text-align: center;
        }

        .mermaid-wrap svg { max-width: 100%; height: auto; }

        /* ── Tables — Responsive ── */
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 1rem 0;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .table-wrap.has-overflow { position: relative; }
        .table-wrap.has-overflow::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 32px;
            pointer-events: none;
            background: linear-gradient(to right, transparent, var(--surface) 90%);
            border-radius: 0 var(--radius) var(--radius) 0;
            opacity: 0.8;
            transition: opacity var(--transition);
        }
        .table-wrap.scrolled-end::after { opacity: 0; }

        .md table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
            line-height: 1.5;
            white-space: nowrap;
        }

        .md thead th {
            background: var(--surface-raised);
            font-weight: 600;
            text-align: left;
            padding: 0.625rem 0.75rem;
            border-bottom: 2px solid var(--border-strong);
            color: var(--text);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .md tbody td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        .md tbody tr:nth-child(even) { background: var(--table-stripe); }
        .md tbody tr:hover { background: var(--table-hover); }
        .md tbody tr:last-child td { border-bottom: none; }

        @media (max-width: 640px) {
            .md table { font-size: 0.75rem; }
            .md thead th, .md tbody td { padding: 0.5rem; }
            .md tbody td:last-child, .md thead th:last-child {
                white-space: normal;
                min-width: 120px;
            }
        }

        /* ── Raw source view ── */
        .raw-source {
            display: none;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: var(--font-mono);
            font-size: 0.8125rem;
            line-height: 1.6;
            color: var(--text);
            tab-size: 4;
        }

        .raw-source.visible { display: block; }

        /* ── Copied toast ── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface-raised);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8125rem;
            box-shadow: var(--shadow);
            z-index: 300;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 2rem 1rem 1rem;
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .footer a { color: var(--text-muted); }

        /* ── Theme toggle animation ── */
        .theme-icon { transition: transform 0.3s ease; }
        .theme-icon:hover { transform: rotate(30deg); }

        /* ── Mobile tweaks ── */
        @media (max-width: 768px) {
            .toc-sidebar { display: none !important; }
        }

        @media (max-width: 480px) {
            .topbar { padding: 0.5rem 0.75rem; }
            .topbar-title { font-size: 0.8125rem; }
            .url-bar { padding: 0.5rem 0.75rem; gap: 0.375rem; }
            .url-bar input { font-size: 0.8125rem; padding: 0.4375rem 0.625rem; }
            .container { padding: 1rem 0.75rem 2rem; }
            .md h1 { font-size: 1.5rem; }
            .md h2 { font-size: 1.25rem; }
            .btn-label { display: none; }
        }

        /* ── Print ── */
        @media print {
            .topbar, .url-bar, .topbar-actions, .toc-sidebar, .toc-overlay, .copy-btn, .code-lang { display: none !important; }
            body { background: #fff; color: #000; }
            .md a { color: #2563eb; }
            .table-wrap { overflow: visible; }
            .table-wrap::after { display: none; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <header class="topbar">
        <!-- TOC toggle (mobile) -->
        <button class="btn btn-icon" id="toc-mobile-btn" title="Table of contents" onclick="toggleTocDrawer()" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/>
            </svg>
        </button>
        <div class="topbar-title" onclick="toggleUrlBar()">
            <span>MD</span> Viewer
        </div>
        <div class="topbar-actions">
            <!-- Raw/Rendered toggle -->
            <button class="btn btn-icon" id="raw-btn" title="View raw source" style="display:none" onclick="toggleRawView()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                </svg>
            </button>
            <!-- TOC toggle (desktop) -->
            <button class="btn btn-icon" id="toc-desktop-btn" title="Table of contents" style="display:none" onclick="toggleTocSidebar()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/>
                </svg>
            </button>
            <!-- Download -->
            <button class="btn btn-icon" id="download-btn" title="Download original .md" style="display:none" onclick="downloadOriginal()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </button>
            <!-- Theme -->
            <button class="btn btn-icon" id="theme-toggle" title="Toggle theme" onclick="toggleTheme()">
                <svg class="theme-icon" id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="theme-icon" id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- URL Input (auto-hides after content loads) -->
    <div class="url-bar" id="url-bar">
        <input type="url" id="markdown-url" placeholder="Paste a markdown URL or filename..."
               onkeydown="if(event.key==='Enter')loadMarkdown()">
        <button class="btn btn-primary" onclick="loadMarkdown()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="13 17 18 12 13 7"/>
                <polyline points="6 17 11 12 6 7"/>
            </svg>
            <span class="btn-label">Load</span>
        </button>
    </div>

    <!-- TOC mobile drawer -->
    <div class="toc-overlay" id="toc-overlay" onclick="closeTocDrawer(event)">
        <nav class="toc-drawer" id="toc-drawer">
            <div class="toc-drawer-header">
                <div class="toc-title" style="border:none;margin:0;padding:0">Contents</div>
                <button class="btn btn-icon" onclick="closeTocDrawer()" style="border:none;background:none">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <ul class="toc-list" id="toc-mobile-list"></ul>
        </nav>
    </div>

    <!-- Content layout -->
    <div class="layout">
        <!-- TOC sidebar (desktop) -->
        <nav class="toc-sidebar" id="toc-sidebar">
            <div class="toc-title">Contents</div>
            <ul class="toc-list" id="toc-desktop-list"></ul>
        </nav>

        <main class="container">
            <div id="content" class="md"></div>
            <pre id="raw-source" class="raw-source"></pre>
        </main>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <footer class="footer" id="footer" style="display:none">
        Rendered with <a href="https://github.com/markedjs/marked" target="_blank" rel="noopener">marked</a>
        + <a href="https://prismjs.com" target="_blank" rel="noopener">Prism</a>
        + <a href="https://mermaid.js.org" target="_blank" rel="noopener">Mermaid</a>
    </footer>

    <script>
        // ── State ──
        let rawMarkdown = '';
        let currentUrl = '';
        let isRawView = false;
        let tocEntries = [];
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
        const FALLBACK_URL = 'https://s3.us-east-2.amazonaws.com/tribixbite/sx/';

        // ── GFM Alert icons (SVG strings) ──
        const ALERT_ICONS = {
            note: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
            tip: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="21" x2="15" y2="21"/></svg>',
            important: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
            warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
            caution: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        };

        // ── Theme ──
        function getPreferredTheme() {
            const stored = localStorage.getItem('md-theme');
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('md-theme', theme);
            document.getElementById('theme-icon-light').style.display = theme === 'dark' ? 'block' : 'none';
            document.getElementById('theme-icon-dark').style.display = theme === 'light' ? 'block' : 'none';
            // Switch Prism theme
            document.getElementById('prism-dark').disabled = theme === 'light';
            document.getElementById('prism-light').disabled = theme === 'dark';
            // Reinit mermaid with matching theme
            try {
                mermaid.initialize({ startOnLoad: false, theme: theme === 'dark' ? 'dark' : 'default' });
            } catch {}
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        applyTheme(getPreferredTheme());

        // ── Mermaid init ──
        mermaid.initialize({
            startOnLoad: false,
            theme: getPreferredTheme() === 'dark' ? 'dark' : 'default',
        });

        // ── URL Resolution ──
        function resolveUrl(url) {
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            return FALLBACK_URL + url;
        }

        // ── Fetch ──
        async function fetchWithFallback(url) {
            try {
                const res = await fetch(url);
                if (res.ok) return res;
                const proxy = await fetch(CORS_PROXY + encodeURIComponent(url));
                if (!proxy.ok) throw new Error(`HTTP ${proxy.status}`);
                return proxy;
            } catch (err) {
                if (err.message.includes('Failed to fetch')) {
                    throw new Error('Unable to access the file. It may have CORS restrictions or may not be publicly accessible.');
                }
                throw err;
            }
        }

        // ── Toast ──
        function showToast(msg, durationMs = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), durationMs);
        }

        // ── Slug generator for heading IDs ──
        function slugify(text) {
            return text.toLowerCase().trim()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        // ── Post-process: wrap tables for horizontal scroll ──
        function wrapTables(container) {
            container.querySelectorAll('table').forEach(table => {
                if (table.parentElement.classList.contains('table-wrap')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'table-wrap';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);

                function checkOverflow() {
                    wrapper.classList.toggle('has-overflow', wrapper.scrollWidth > wrapper.clientWidth + 2);
                }

                wrapper.addEventListener('scroll', () => {
                    const atEnd = wrapper.scrollLeft + wrapper.clientWidth >= wrapper.scrollWidth - 4;
                    wrapper.classList.toggle('scrolled-end', atEnd);
                }, { passive: true });

                checkOverflow();
                window.addEventListener('resize', checkOverflow, { passive: true });
            });
        }

        // ── Post-process: code blocks with copy button + language label ──
        function enhanceCodeBlocks(container) {
            container.querySelectorAll('pre').forEach(pre => {
                if (pre.parentElement.classList.contains('code-block-wrap')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrap';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                // Language label
                const code = pre.querySelector('code');
                const langMatch = code?.className?.match(/language-(\w+)/);
                if (langMatch && langMatch[1] !== 'undefined') {
                    const label = document.createElement('span');
                    label.className = 'code-lang';
                    label.textContent = langMatch[1];
                    wrapper.appendChild(label);
                }

                // Copy button
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
                btn.onclick = () => {
                    const text = code?.textContent || pre.textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
                            btn.classList.remove('copied');
                        }, 2000);
                    });
                };
                wrapper.appendChild(btn);
            });
        }

        // ── Post-process: heading anchors + TOC generation ──
        function processHeadings(container) {
            tocEntries = [];
            const usedSlugs = new Set();
            container.querySelectorAll('h1, h2, h3, h4').forEach(heading => {
                const text = heading.textContent.trim();
                let slug = slugify(text);
                // Dedupe slugs
                let unique = slug;
                let i = 1;
                while (usedSlugs.has(unique)) { unique = `${slug}-${i++}`; }
                usedSlugs.add(unique);
                slug = unique;

                heading.id = slug;

                // Add anchor link
                const anchor = document.createElement('a');
                anchor.className = 'heading-anchor';
                anchor.href = `#${slug}`;
                anchor.textContent = '#';
                anchor.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const url = new URL(window.location);
                    url.hash = slug;
                    navigator.clipboard.writeText(url.toString()).then(() => {
                        showToast('Link copied to clipboard');
                    });
                    history.replaceState(null, '', url.toString());
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                heading.appendChild(anchor);

                // Click heading to scroll + copy link
                heading.style.cursor = 'pointer';
                heading.onclick = (e) => {
                    if (e.target === anchor) return;
                    anchor.click();
                };

                tocEntries.push({
                    level: parseInt(heading.tagName[1]),
                    text,
                    slug,
                });
            });

            buildToc();
        }

        // ── Build TOC lists ──
        function buildToc() {
            const hasToc = tocEntries.length > 2;
            document.getElementById('toc-desktop-btn').style.display = hasToc ? 'inline-flex' : 'none';
            document.getElementById('toc-mobile-btn').style.display = hasToc ? 'inline-flex' : 'none';

            if (!hasToc) return;

            const html = tocEntries.map(e => {
                const cls = `toc-h${e.level}`;
                return `<li><a href="#${e.slug}" class="${cls}" onclick="onTocClick(event, '${e.slug}')">${escHtml(e.text)}</a></li>`;
            }).join('');

            document.getElementById('toc-desktop-list').innerHTML = html;
            document.getElementById('toc-mobile-list').innerHTML = html;

            // Intersection observer for active TOC highlighting
            setupTocObserver();
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function onTocClick(e, slug) {
            e.preventDefault();
            const el = document.getElementById(slug);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            closeTocDrawer();
            // Update hash without jump
            history.replaceState(null, '', `#${slug}`);
        }

        // ── TOC active state via IntersectionObserver ──
        let tocObserver = null;
        function setupTocObserver() {
            if (tocObserver) tocObserver.disconnect();
            const headings = tocEntries.map(e => document.getElementById(e.slug)).filter(Boolean);
            if (!headings.length) return;

            tocObserver = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.toc-list a').forEach(a => a.classList.remove('active'));
                        document.querySelectorAll(`.toc-list a[href="#${entry.target.id}"]`).forEach(a => a.classList.add('active'));
                    }
                });
            }, { rootMargin: '-60px 0px -75% 0px', threshold: 0 });

            headings.forEach(h => tocObserver.observe(h));
        }

        // ── TOC toggle ──
        function toggleTocSidebar() {
            const sidebar = document.getElementById('toc-sidebar');
            sidebar.classList.toggle('visible');
            document.getElementById('toc-desktop-btn').classList.toggle('btn-active', sidebar.classList.contains('visible'));
        }

        function toggleTocDrawer() {
            document.getElementById('toc-overlay').classList.add('open');
        }

        function closeTocDrawer(e) {
            if (e && e.target !== document.getElementById('toc-overlay')) return;
            document.getElementById('toc-overlay').classList.remove('open');
        }

        // ── URL bar auto-hide ──
        function toggleUrlBar() {
            const bar = document.getElementById('url-bar');
            bar.classList.toggle('collapsed');
            if (!bar.classList.contains('collapsed')) {
                setTimeout(() => document.getElementById('markdown-url').focus(), 300);
            }
        }

        // ── Raw/Rendered toggle ──
        function toggleRawView() {
            isRawView = !isRawView;
            const content = document.getElementById('content');
            const rawEl = document.getElementById('raw-source');
            const btn = document.getElementById('raw-btn');

            if (isRawView) {
                content.style.display = 'none';
                rawEl.textContent = rawMarkdown;
                rawEl.classList.add('visible');
                btn.classList.add('btn-active');
            } else {
                content.style.display = '';
                rawEl.classList.remove('visible');
                btn.classList.remove('btn-active');
            }
        }

        // ── Post-process: GFM alerts ([!NOTE], [!TIP], etc.) ──
        function processAlerts(container) {
            container.querySelectorAll('blockquote').forEach(bq => {
                const firstP = bq.querySelector('p');
                if (!firstP) return;
                const html = firstP.innerHTML;
                // Match [!NOTE], [!TIP], [!IMPORTANT], [!WARNING], [!CAUTION]
                const match = html.match(/^\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/i);
                if (!match) return;

                const type = match[1].toLowerCase();
                const icon = ALERT_ICONS[type] || '';

                // Remove the [!TYPE] marker from the first paragraph
                firstP.innerHTML = html.replace(match[0], '').replace(/^<br\s*\/?>/, '');

                // If the first paragraph is now empty, remove it
                if (!firstP.textContent.trim() && !firstP.querySelector('*')) {
                    firstP.remove();
                }

                // Convert blockquote to alert
                const alert = document.createElement('div');
                alert.className = `gfm-alert gfm-alert-${type}`;

                const title = document.createElement('div');
                title.className = 'gfm-alert-title';
                title.innerHTML = `${icon} ${type.charAt(0).toUpperCase() + type.slice(1)}`;

                alert.appendChild(title);
                // Move remaining children
                while (bq.firstChild) alert.appendChild(bq.firstChild);
                bq.replaceWith(alert);
            });
        }

        // ── Post-process: Mermaid diagrams ──
        async function processMermaid(container) {
            const mermaidBlocks = container.querySelectorAll('code.language-mermaid');
            if (!mermaidBlocks.length) return;

            let id = 0;
            for (const code of mermaidBlocks) {
                const pre = code.parentElement;
                const wrapper = pre.parentElement; // code-block-wrap
                const source = code.textContent;

                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid-wrap';
                const innerId = `mermaid-${id++}`;

                try {
                    const { svg } = await mermaid.render(innerId, source);
                    mermaidDiv.innerHTML = svg;
                } catch (err) {
                    mermaidDiv.innerHTML = `<div class="error" style="text-align:left">Mermaid error: ${err.message}</div>`;
                }

                // Replace the code-block-wrap (or pre if no wrap)
                const target = wrapper?.classList?.contains('code-block-wrap') ? wrapper : pre;
                target.replaceWith(mermaidDiv);
            }
        }

        // ── Render ──
        async function fetchAndRenderMarkdown(markdownUrl) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
            document.getElementById('footer').style.display = 'none';
            document.getElementById('raw-source').classList.remove('visible');
            isRawView = false;

            try {
                const resolved = resolveUrl(markdownUrl);
                currentUrl = resolved;
                const res = await fetchWithFallback(resolved);
                rawMarkdown = await res.text();

                if (!rawMarkdown.trim()) throw new Error('The file appears to be empty.');

                const html = marked.parse(rawMarkdown);
                const safe = DOMPurify.sanitize(html);
                content.innerHTML = safe;

                // Post-process pipeline
                processAlerts(content);
                wrapTables(content);
                enhanceCodeBlocks(content);
                processHeadings(content);
                await processMermaid(content);

                // Syntax highlight code blocks
                Prism.highlightAllUnder(content);

                // Show action buttons
                document.getElementById('download-btn').style.display = 'inline-flex';
                document.getElementById('raw-btn').style.display = 'inline-flex';
                document.getElementById('footer').style.display = 'block';

                // Auto-collapse URL bar
                document.getElementById('url-bar').classList.add('collapsed');

                // Update title from first h1
                const h1 = content.querySelector('h1');
                if (h1) {
                    const titleText = h1.childNodes[0]?.textContent?.trim() || h1.textContent.replace('#','').trim();
                    document.title = titleText + ' — MD Viewer';
                    document.querySelector('.topbar-title').innerHTML = '<span>MD</span> ' + escHtml(titleText);
                }

                // Scroll to hash if present
                if (window.location.hash) {
                    const target = document.getElementById(window.location.hash.slice(1));
                    if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth' }), 100);
                }
            } catch (err) {
                content.innerHTML = `
                    <div class="error">
                        <strong>Error loading markdown:</strong> ${err.message}<br><br>
                        <strong>Tips:</strong>
                        <ul style="margin-top:0.5rem;padding-left:1.25rem">
                            <li>Ensure the URL is correct and publicly accessible</li>
                            <li>Try a raw content URL (e.g. raw.githubusercontent.com)</li>
                            <li>Check that the server allows CORS</li>
                        </ul>
                    </div>`;
            }
        }

        // ── Download ──
        function downloadOriginal() {
            if (!rawMarkdown) return;
            const filename = currentUrl.split('/').pop().split('?')[0] || 'document.md';
            const blob = new Blob([rawMarkdown], { type: 'text/markdown;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename.endsWith('.md') ? filename : filename + '.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        // ── Load ──
        function loadMarkdown() {
            const url = document.getElementById('markdown-url').value.trim();
            if (!url) {
                document.getElementById('content').innerHTML = '<div class="warning">Enter a markdown URL or filename above.</div>';
                return;
            }
            const params = new URLSearchParams(window.location.search);
            params.set('md', url);
            history.replaceState(null, '', '?' + params.toString());
            fetchAndRenderMarkdown(url);
        }

        // ── marked config ──
        marked.setOptions({
            breaks: true,
            gfm: true,
        });

        // ── Init ──
        const params = new URLSearchParams(window.location.search);
        const mdParam = params.get('md');
        if (mdParam) {
            document.getElementById('markdown-url').value = mdParam;
            fetchAndRenderMarkdown(mdParam);
        } else {
            document.getElementById('content').innerHTML = `
                <div class="warning">
                    Enter a markdown URL above or use the <code>?md=</code> query parameter.<br>
                    Example: <code>?md=https://example.com/readme.md</code>
                </div>`;
        }
    </script>
</body>
</html>
