<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        /* ── Theme Variables ── */
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
            --radius: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --bg: #0b0f19;
            --surface: #141a2a;
            --surface-raised: #1c2438;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --border: #1e293b;
            --border-strong: #334155;
            --code-bg: #0f172a;
            --table-stripe: rgba(96, 165, 250, 0.04);
            --table-hover: rgba(96, 165, 250, 0.08);
            --scrollbar-track: #1e293b;
            --scrollbar-thumb: #475569;
            --error-bg: #1c0f0f;
            --error-border: #7f1d1d;
            --error-text: #fecaca;
            --warning-bg: #1c1509;
            --warning-border: #92400e;
            --warning-text: #fde68a;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --glow: 0 0 20px rgba(96, 165, 250, 0.1);
        }

        [data-theme="light"] {
            color-scheme: light;
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-raised: #f1f5f9;
            --text: #1e293b;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --code-bg: #f1f5f9;
            --table-stripe: rgba(37, 99, 235, 0.03);
            --table-hover: rgba(37, 99, 235, 0.06);
            --scrollbar-track: #e2e8f0;
            --scrollbar-thumb: #94a3b8;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #991b1b;
            --warning-bg: #fffbeb;
            --warning-border: #fde68a;
            --warning-text: #92400e;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --glow: none;
        }

        /* ── Reset ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* ── Base ── */
        html {
            background: var(--bg);
            color: var(--text);
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            line-height: 1.7;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding: 0;
        }

        /* ── Top Bar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .topbar-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .topbar-title span {
            color: var(--accent);
        }

        .topbar-actions {
            display: flex;
            gap: 0.375rem;
            flex-shrink: 0;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface-raised);
            color: var(--text-muted);
            font-size: 0.8125rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .btn:hover { background: var(--border); color: var(--text); border-color: var(--border-strong); }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }

        .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

        .btn-icon {
            padding: 0.375rem;
            min-width: 34px;
            min-height: 34px;
            justify-content: center;
        }

        /* ── URL Input Bar ── */
        .url-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .url-bar input {
            flex: 1;
            min-width: 0;
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.875rem;
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--transition);
        }

        .url-bar input:focus { border-color: var(--accent); }
        .url-bar input::placeholder { color: var(--text-dim); }

        /* ── Container ── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
        }

        /* ── Status Messages ── */
        .error {
            color: var(--error-text);
            padding: 1rem;
            border: 1px solid var(--error-border);
            border-radius: var(--radius);
            background: var(--error-bg);
            margin: 1rem 0;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .warning {
            color: var(--warning-text);
            padding: 1rem;
            border: 1px solid var(--warning-border);
            border-radius: var(--radius);
            background: var(--warning-bg);
            margin: 1rem 0;
            font-size: 0.875rem;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ── Markdown Content ── */
        .md h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 1rem;
            padding-bottom: 0.625rem;
            border-bottom: 2px solid var(--border);
            line-height: 1.3;
        }

        .md h2 {
            font-size: 1.375rem;
            font-weight: 650;
            margin: 2rem 0 0.75rem;
            padding-bottom: 0.375rem;
            border-bottom: 1px solid var(--border);
            line-height: 1.35;
        }

        .md h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 1.5rem 0 0.5rem;
            color: var(--text);
        }

        .md h4 {
            font-size: 1rem;
            font-weight: 600;
            margin: 1.25rem 0 0.5rem;
            color: var(--text-muted);
        }

        .md p { margin-bottom: 0.875rem; }

        .md a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color var(--transition);
        }
        .md a:hover { border-bottom-color: var(--accent); }

        .md strong { font-weight: 650; color: var(--text); }

        .md hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 2rem 0;
        }

        /* ── Inline Code ── */
        .md code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: var(--code-bg);
            padding: 0.15em 0.4em;
            border-radius: 4px;
            color: var(--accent);
            word-break: break-word;
        }

        /* ── Code Blocks ── */
        .md pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            -webkit-overflow-scrolling: touch;
        }

        .md pre code {
            background: none;
            padding: 0;
            color: var(--text);
            font-size: 0.8125rem;
            line-height: 1.6;
            word-break: normal;
        }

        /* ── Blockquotes ── */
        .md blockquote {
            border-left: 3px solid var(--accent);
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            color: var(--text-muted);
            background: var(--surface-raised);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        .md blockquote p:last-child { margin-bottom: 0; }

        /* ── Lists ── */
        .md ul, .md ol {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }

        .md li { margin-bottom: 0.25rem; }
        .md li::marker { color: var(--text-dim); }

        /* ── Task Lists ── */
        .md ul li input[type="checkbox"] {
            margin-right: 0.5rem;
            accent-color: var(--accent);
        }

        /* ── Images ── */
        .md img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin: 1rem 0;
        }

        /* ── Tables — Responsive ── */
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 1rem 0;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        /* Scroll hint gradient on mobile */
        .table-wrap.has-overflow {
            position: relative;
        }
        .table-wrap.has-overflow::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 32px;
            pointer-events: none;
            background: linear-gradient(to right, transparent, var(--surface) 90%);
            border-radius: 0 var(--radius) var(--radius) 0;
            opacity: 0.8;
            transition: opacity var(--transition);
        }
        .table-wrap.scrolled-end::after { opacity: 0; }

        .md table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
            line-height: 1.5;
            white-space: nowrap;
        }

        .md thead th {
            background: var(--surface-raised);
            font-weight: 600;
            text-align: left;
            padding: 0.625rem 0.75rem;
            border-bottom: 2px solid var(--border-strong);
            color: var(--text);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .md tbody td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        .md tbody tr:nth-child(even) { background: var(--table-stripe); }
        .md tbody tr:hover { background: var(--table-hover); }
        .md tbody tr:last-child td { border-bottom: none; }

        /* On small screens allow cell text wrapping for content-heavy tables */
        @media (max-width: 640px) {
            .md table {
                font-size: 0.75rem;
            }
            .md thead th,
            .md tbody td {
                padding: 0.5rem;
            }
            /* Allow wrapping on the last column (usually "Status" / description) */
            .md tbody td:last-child,
            .md thead th:last-child {
                white-space: normal;
                min-width: 120px;
            }
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 2rem 1rem 1rem;
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .footer a { color: var(--text-muted); }

        /* ── Theme toggle animation ── */
        .theme-icon { transition: transform 0.3s ease; }
        .theme-icon:hover { transform: rotate(30deg); }

        /* ── Mobile tweaks ── */
        @media (max-width: 480px) {
            .topbar { padding: 0.5rem 0.75rem; }
            .topbar-title { font-size: 0.8125rem; }
            .url-bar { padding: 0.5rem 0.75rem; gap: 0.375rem; }
            .url-bar input { font-size: 0.8125rem; padding: 0.4375rem 0.625rem; }
            .container { padding: 1rem 0.75rem 2rem; }
            .md h1 { font-size: 1.5rem; }
            .md h2 { font-size: 1.25rem; }
            .btn-label { display: none; }
        }

        /* ── Print ── */
        @media print {
            .topbar, .url-bar, .topbar-actions { display: none; }
            body { background: #fff; color: #000; }
            .md a { color: #2563eb; }
            .table-wrap { overflow: visible; }
            .table-wrap::after { display: none; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-title">
            <span>MD</span> Viewer
        </div>
        <div class="topbar-actions">
            <button class="btn btn-icon" id="download-btn" title="Download original .md" style="display:none" onclick="downloadOriginal()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </button>
            <button class="btn btn-icon" id="theme-toggle" title="Toggle theme" onclick="toggleTheme()">
                <svg class="theme-icon" id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="theme-icon" id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- URL Input -->
    <div class="url-bar" id="url-bar">
        <input type="url" id="markdown-url" placeholder="Paste a markdown URL or filename..."
               onkeydown="if(event.key==='Enter')loadMarkdown()">
        <button class="btn btn-primary" onclick="loadMarkdown()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="13 17 18 12 13 7"/>
                <polyline points="6 17 11 12 6 7"/>
            </svg>
            <span class="btn-label">Load</span>
        </button>
    </div>

    <!-- Content -->
    <main class="container">
        <div id="content" class="md"></div>
    </main>

    <footer class="footer" id="footer" style="display:none">
        Rendered with <a href="https://github.com/markedjs/marked" target="_blank" rel="noopener">marked</a>
    </footer>

    <script>
        // ── State ──
        let rawMarkdown = '';
        let currentUrl = '';
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
        const FALLBACK_URL = 'https://s3.us-east-2.amazonaws.com/tribixbite/sx/';

        // ── Theme ──
        function getPreferredTheme() {
            const stored = localStorage.getItem('md-theme');
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('md-theme', theme);
            document.getElementById('theme-icon-light').style.display = theme === 'dark' ? 'block' : 'none';
            document.getElementById('theme-icon-dark').style.display = theme === 'light' ? 'block' : 'none';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        applyTheme(getPreferredTheme());

        // ── URL Resolution ──
        function resolveUrl(url) {
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            // Bare filenames resolve to the S3 fallback bucket
            return FALLBACK_URL + url;
        }

        // ── Fetch ──
        async function fetchWithFallback(url) {
            try {
                const res = await fetch(url);
                if (res.ok) return res;
                const proxy = await fetch(CORS_PROXY + encodeURIComponent(url));
                if (!proxy.ok) throw new Error(`HTTP ${proxy.status}`);
                return proxy;
            } catch (err) {
                if (err.message.includes('Failed to fetch')) {
                    throw new Error('Unable to access the file. It may have CORS restrictions or may not be publicly accessible.');
                }
                throw err;
            }
        }

        // ── Post-process: wrap tables for horizontal scroll ──
        function wrapTables(container) {
            container.querySelectorAll('table').forEach(table => {
                if (table.parentElement.classList.contains('table-wrap')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'table-wrap';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);

                // Detect overflow and add scroll hint
                function checkOverflow() {
                    if (wrapper.scrollWidth > wrapper.clientWidth + 2) {
                        wrapper.classList.add('has-overflow');
                    } else {
                        wrapper.classList.remove('has-overflow');
                    }
                }

                wrapper.addEventListener('scroll', () => {
                    const atEnd = wrapper.scrollLeft + wrapper.clientWidth >= wrapper.scrollWidth - 4;
                    wrapper.classList.toggle('scrolled-end', atEnd);
                }, { passive: true });

                checkOverflow();
                window.addEventListener('resize', checkOverflow, { passive: true });
            });
        }

        // ── Render ──
        async function fetchAndRenderMarkdown(markdownUrl) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
            document.getElementById('footer').style.display = 'none';

            try {
                const resolved = resolveUrl(markdownUrl);
                currentUrl = resolved;
                const res = await fetchWithFallback(resolved);
                rawMarkdown = await res.text();

                if (!rawMarkdown.trim()) throw new Error('The file appears to be empty.');

                const html = marked.parse(rawMarkdown);
                const safe = DOMPurify.sanitize(html);
                content.innerHTML = safe;

                // Post-process
                wrapTables(content);

                // Update UI
                document.getElementById('download-btn').style.display = 'inline-flex';
                document.getElementById('footer').style.display = 'block';

                // Update title from first h1
                const h1 = content.querySelector('h1');
                if (h1) {
                    document.title = h1.textContent + ' — MD Viewer';
                    document.querySelector('.topbar-title').innerHTML = '<span>MD</span> ' + h1.textContent;
                }
            } catch (err) {
                content.innerHTML = `
                    <div class="error">
                        <strong>Error loading markdown:</strong> ${err.message}<br><br>
                        <strong>Tips:</strong>
                        <ul style="margin-top:0.5rem;padding-left:1.25rem">
                            <li>Ensure the URL is correct and publicly accessible</li>
                            <li>Try a raw content URL (e.g. raw.githubusercontent.com)</li>
                            <li>Check that the server allows CORS</li>
                        </ul>
                    </div>`;
            }
        }

        // ── Download ──
        function downloadOriginal() {
            if (!rawMarkdown) return;
            const filename = currentUrl.split('/').pop().split('?')[0] || 'document.md';
            const blob = new Blob([rawMarkdown], { type: 'text/markdown;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename.endsWith('.md') ? filename : filename + '.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        // ── Load ──
        function loadMarkdown() {
            const url = document.getElementById('markdown-url').value.trim();
            if (!url) {
                document.getElementById('content').innerHTML = '<div class="warning">Enter a markdown URL or filename above.</div>';
                return;
            }
            // Update URL bar without reload
            const params = new URLSearchParams(window.location.search);
            params.set('md', url);
            history.replaceState(null, '', '?' + params.toString());
            fetchAndRenderMarkdown(url);
        }

        // ── marked config ──
        marked.setOptions({
            breaks: true,
            gfm: true,
        });

        // ── Init ──
        const params = new URLSearchParams(window.location.search);
        const mdParam = params.get('md');
        if (mdParam) {
            document.getElementById('markdown-url').value = mdParam;
            fetchAndRenderMarkdown(mdParam);
        } else {
            document.getElementById('content').innerHTML = `
                <div class="warning">
                    Enter a markdown URL above or use the <code>?md=</code> query parameter.<br>
                    Example: <code>?md=https://example.com/readme.md</code>
                </div>`;
        }
    </script>
</body>
</html>
