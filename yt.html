<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Channel Explorer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        .dropdown {
            max-height: 200px;
            overflow-y: auto;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Custom hidden class with !important to override Tailwind */
        .hidden {
            display: none !important;
        }
        /* Override Tailwind's display utilities for our show/hide functionality */
        .show {
            display: block !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div id="app" class="container mx-auto px-4 py-8">
        <div class="bg-gray-800 rounded-lg shadow-lg p-6">
            <h1 class="text-2xl font-bold mb-6">YouTube Channel Explorer</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="relative">
                    <div class="flex gap-2">
                        <input 
                            type="text" 
                            id="channelName" 
                            placeholder="Channel Name" 
                            class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500"
                        >
                        <button 
                            id="searchBtn" 
                            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors"
                        >
                            Search
                        </button>
                    </div>
                    <div id="searchResults" style="display: none;" class="absolute z-10 w-full mt-1 bg-gray-700 border border-gray-600 rounded-md shadow-lg dropdown max-h-60 overflow-y-auto"></div>
                </div>
                
                <input 
                    type="password" 
                    id="apiKey" 
                    placeholder="API Key" 
                    class="px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500"
                >
            </div>

            <div id="videoSection" style="display: none;">
                <div class="space-y-4">
                    <div class="flex flex-wrap gap-4 items-center">
                        <div class="flex items-center gap-2">
                            <select id="languageFilter" class="px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500">
                                <option value="">All Languages</option>
                                <option value="en">English</option>
                                <option value="es">Spanish</option>
                                <option value="fr">French</option>
                                <option value="it">Italian</option>
                                <option value="zh">Chinese</option>
                            </select>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <input 
                                type="number" 
                                id="limitRows" 
                                placeholder="Limit Rows" 
                                class="w-32 px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500"
                            >
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <input 
                                type="text" 
                                id="includeText" 
                                placeholder="Include (comma separated)" 
                                class="px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500"
                            >
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <input 
                                type="text" 
                                id="removeText" 
                                placeholder="Remove videos containing..." 
                                class="px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500"
                            >
                            <button 
                                id="removeBtn" 
                                class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition-colors"
                            >
                                Remove
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-4 items-center bg-gray-700 p-4 rounded-lg">
                        <h3 class="text-lg font-semibold w-full">yt-dlp Options</h3>
                        <div class="flex items-center gap-2">
                            <select id="maxResolution" class="px-4 py-2 bg-gray-600 border border-gray-500 rounded-lg focus:outline-none focus:border-blue-500">
                                <option value="best">Best Quality</option>
                                <option value="1080">1080p</option>
                                <option value="720">720p</option>
                                <option value="480">480p</option>
                                <option value="360">360p</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="flex items-center gap-2">
                                <input type="checkbox" id="includeSubtitles" checked class="w-4 h-4 bg-gray-600 border-gray-500 rounded">
                                Include Subtitles
                            </label>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="flex items-center gap-2">
                                <input type="checkbox" id="includeChannelName" class="w-4 h-4 bg-gray-600 border-gray-500 rounded">
                                Include Channel Name
                            </label>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button 
                            id="exportAll" 
                            class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg transition-colors"
                        >
                            Export All Data
                        </button>
                        <button 
                            id="exportUrls" 
                            class="px-4 py-2 bg-yellow-600 hover:bg-yellow-700 rounded-lg transition-colors"
                        >
                            Export URLs
                        </button>
                        <button 
                            id="exportScript" 
                            class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg transition-colors"
                        >
                            Export yt-dlp Script
                        </button>
                    </div>

                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="bg-gray-700">
                                <th class="p-3 text-left">Title</th>
                                <th class="p-3 text-left">Upload Date</th>
                                <th class="p-3 text-left">Views</th>
                                <th class="p-3 text-left">URL</th>
                            </tr>
                        </thead>
                        <tbody id="videoTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="loading hidden">
        <div class="loading-spinner"></div>
    </div>

    <script>
        const state = {
            videos: [],
            filteredVideos: [],
            loading: false
        };

        // Language detection patterns
        const languagePatterns = {
            en: /^[a-zA-Z0-9\s!?'"()-]*$/,
            es: /[áéíóúñ¡¿]/i,
            fr: /[éèêëàâîïôûùüç]/i,
            it: /[àèéìíîòóùú]/i,
            zh: /[\u4e00-\u9fff]/
        };

        function detectLanguage(title) {
            // Check for obvious markers first
            if (title.includes('Let\'s') || title.includes('&#39;s')) return 'en';
            if (title.includes('¡') || title.includes('¿')) return 'es';
            if (title.includes('Лучшие') || title.includes('видео')) return 'ru';
            
            // Then check patterns
            for (const [lang, pattern] of Object.entries(languagePatterns)) {
                if (pattern.test(title)) return lang;
            }
            
            // Default to English if no specific patterns match
            return 'en';
        }

        function applyFilters() {
            const languageFilter = document.getElementById('languageFilter').value;
            const maxViews = document.getElementById('maxViews').value;
            const removeText = document.getElementById('removeText').value.toLowerCase();

            state.filteredVideos = state.videos.filter(video => {
                // Language filter
                if (languageFilter && detectLanguage(video.title) !== languageFilter) {
                    return false;
                }

                // Max views filter
                if (maxViews) {
                    const viewCount = parseInt(video.viewCount.replace(/,/g, ''));
                    if (viewCount > parseInt(maxViews)) {
                        return false;
                    }
                }

                // Remove text filter
                if (removeText && video.title.toLowerCase().includes(removeText)) {
                    return false;
                }

                return true;
            });

            updateVideoTable();
        }

        function updateVideoTable() {
            console.log('Updating video table with videos:', state.filteredVideos);
            const tbody = document.getElementById('videoTable');
            const videoSection = document.getElementById('videoSection');
            
            if (state.filteredVideos.length === 0) {
                console.log('No videos to display');
                tbody.innerHTML = '<tr><td colspan="4" class="p-3 text-center">No videos match the current filters</td></tr>';
                return;
            }

            videoSection.style.display = 'block';
            tbody.innerHTML = state.filteredVideos.map(video => `
                <tr class="border-t border-gray-700 hover:bg-gray-700">
                    <td class="p-3">${video.title}</td>
                    <td class="p-3">${video.uploadDate}</td>
                    <td class="p-3">${video.viewCount}</td>
                    <td class="p-3">
                        <a href="${video.url}" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:text-blue-300">
                            ${video.url}
                        </a>
                    </td>
                </tr>
            `).join('');
        }

        function exportYtDlpScript() {
            const urls = state.filteredVideos.map(video => video.url);
            const script = `#!/bin/bash
# YouTube Download Script
# Generated ${new Date().toLocaleString()}

# Make sure yt-dlp is installed
command -v yt-dlp >/dev/null 2>&1 || { echo "yt-dlp is required but not installed. Aborting." >&2; exit 1; }

# Download videos
${urls.map(url => `yt-dlp "${url}"`).join('\n')}

echo "Download complete!"`;

            const blob = new Blob([script], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'download_videos.sh';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function showLoading(show) {
            const loadingEl = document.getElementById('loading');
            if (show) {
                loadingEl.classList.remove('hidden');
            } else {
                loadingEl.classList.add('hidden');
            }
            state.loading = show;
        }

        function showError(message) {
            alert(message);
        }

        async function searchChannel() {
            const channelName = document.getElementById('channelName').value;
            const apiKey = document.getElementById('apiKey').value;
            const searchResults = document.getElementById('searchResults');

            if (!channelName || !apiKey) {
                showError('Please enter both channel name and API key');
                return;
            }

            showLoading(true);
            searchResults.innerHTML = '';
            
            try {
                console.log('Searching for channel:', channelName);
                const response = await fetch(
                    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(channelName)}&key=${apiKey}`
                );

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API request failed');
                }

                const data = await response.json();
                console.log('Search results:', data);

                if (!data.items?.length) {
                    showError('No channels found');
                    return;
                }

                // Clear existing results and show dropdown
                searchResults.innerHTML = '';
                searchResults.style.display = 'block';
                searchResults.style.position = 'absolute';
                searchResults.style.width = '100%';
                searchResults.style.zIndex = '1000';
                searchResults.style.backgroundColor = '#374151';
                searchResults.style.border = '1px solid #4B5563';
                searchResults.style.borderRadius = '0.375rem';
                searchResults.style.marginTop = '0.25rem';
                searchResults.style.boxShadow = '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)';

                data.items.forEach(channel => {
                    const div = document.createElement('div');
                    div.className = 'p-3 hover:bg-gray-600 cursor-pointer border-b border-gray-600 last:border-b-0';
                    div.textContent = channel.snippet.title;
                    div.onclick = () => {
                        fetchVideos(channel.id.channelId);
                        searchResults.style.display = 'none';
                    };
                    searchResults.appendChild(div);
                    console.log('Added channel to dropdown:', channel.snippet.title);
                });
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        async function fetchVideos(channelId) {
            const apiKey = document.getElementById('apiKey').value;
            document.getElementById('searchResults').classList.add('hidden');
            showLoading(true);
            state.videos = [];
            
            try {
                let nextPageToken = '';
                
                do {
                    const response = await fetch(
                        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=50&order=date&type=video&key=${apiKey}${nextPageToken ? `&pageToken=${nextPageToken}` : ''}`
                    );

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error?.message || 'Failed to fetch videos');
                    }

                    const data = await response.json();
                    
                    // Fetch view counts
                    const videoIds = data.items.map(item => item.id.videoId).join(',');
                    const statsResponse = await fetch(
                        `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${videoIds}&key=${apiKey}`
                    );

                    if (!statsResponse.ok) {
                        throw new Error('Failed to fetch video statistics');
                    }

                    const statsData = await statsResponse.json();
                    
                    const videosWithStats = data.items.map(item => {
                        const stats = statsData.items.find(stat => stat.id === item.id.videoId);
                        return {
                            title: item.snippet.title,
                            url: `https://www.youtube.com/watch?v=${item.id.videoId}`,
                            uploadDate: new Date(item.snippet.publishedAt).toLocaleDateString(),
                            viewCount: parseInt(stats?.statistics.viewCount || 0).toLocaleString()
                        };
                    });
                    
                    state.videos.push(...videosWithStats);
                    nextPageToken = data.nextPageToken;
                    
                    updateVideoTable();
                } while (nextPageToken);

                document.getElementById('videoSection').style.display = 'block';
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        function updateVideoTable() {
            const tbody = document.getElementById('videoTable');
            tbody.innerHTML = state.videos.map(video => `
                <tr class="border-t border-gray-700 hover:bg-gray-700">
                    <td class="p-3">${video.title}</td>
                    <td class="p-3">${video.uploadDate}</td>
                    <td class="p-3">${video.viewCount}</td>
                    <td class="p-3">
                        <a href="${video.url}" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:text-blue-300">
                            ${video.url}
                        </a>
                    </td>
                </tr>
            `).join('');
        }

        function exportToCsv(data, filename) {
            const csv = [
                Object.keys(data[0]).join(','),
                ...data.map(row => Object.values(row).map(value => `"${value}"`).join(','))
            ].join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        // Event Listeners
        document.getElementById('searchBtn').addEventListener('click', searchChannel);
        document.getElementById('exportAll').addEventListener('click', () => 
            exportToCsv(state.videos, 'youtube_videos.csv')
        );
        document.getElementById('exportUrls').addEventListener('click', () => 
            exportToCsv(state.videos.map(video => ({ url: video.url })), 'video_urls.csv')
        );

        // Enter key handler for search
        document.getElementById('channelName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchChannel();
            }
        });
    </script>
</body>
</html>
